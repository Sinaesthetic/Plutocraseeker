name: Package AddOn

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build addon zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build package
        run: npm run package

      - name: Verify package contents
        shell: bash
        run: |
          set -euo pipefail
          unzip -l Plutocraseeker.zip
          if unzip -l Plutocraseeker.zip | grep -E '\.(png|psd|xcf)$'; then
            echo "Package contains source image files that should not ship with the addon." >&2
            exit 1
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Plutocraseeker-addon
          path: Plutocraseeker.zip
          if-no-files-found: error
